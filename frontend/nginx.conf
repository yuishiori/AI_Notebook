server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy for API if needed, but here we assume direct CORS
    # location /api/ {
    #     proxy_pass http://backend-service-url/;
    # }
}
